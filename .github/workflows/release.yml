name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            linker: gcc-aarch64-linux-gnu

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            linker: gcc-aarch64-linux-gnu
            musl: true

          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl == true
        run: sudo apt-get install -y musl-tools

      - name: Install cross linker (${{ matrix.linker }})
        if: matrix.linker != ''
        run: sudo apt-get install -y ${{ matrix.linker }}

      - name: Configure cross linker in cargo
        if: matrix.linker != ''
        shell: bash
        run: |
          TARGET_UPPER=$(echo "${{ matrix.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${TARGET_UPPER}_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN_NAME="steamer"
          ASSET_NAME="${BIN_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "${BIN_NAME}"
          tar -czf "${ASSET_NAME}" "${BIN_NAME}" README.md LICENSE
          echo "ASSET=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN_NAME = "steamer"
          $ASSET_NAME = "${BIN_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "${BIN_NAME}.exe"
          Compress-Archive -Path "${BIN_NAME}.exe", "README.md", "LICENSE" -DestinationPath $ASSET_NAME
          "ASSET=$ASSET_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
